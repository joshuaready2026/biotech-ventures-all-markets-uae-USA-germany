<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Tech Ventures</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --bg: #1c1f24;      /* Gunmetal gray */
            --dark: #111417;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--dark);
            color: #ffffff;
            overflow-x: hidden;
        }
        
        /* Full-screen video - the ONLY major attraction */
        .video-section {
            height: 100vh;
            width: 100%;
            position: relative;
            background: #000;
        }
        
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* Minimal contact section at the bottom */
        .contact {
            padding: 7rem 5% 5rem;
            background: var(--bg);
            text-align: center;
        }
        
        .contact h2 {
            font-size: 1.95rem;
            font-weight: 500;
            margin-bottom: 1.8rem;
            letter-spacing: 0.5px;
        }
        
        .email {
            font-size: 1.85rem;
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .email:hover {
            opacity: 0.75;
        }
        
        footer {
            padding: 2.5rem 5%;
            text-align: center;
            font-size: 0.95rem;
            opacity: 0.5;
            background: var(--dark);
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        
        @media (max-width: 768px) {
            .contact { padding: 5rem 5% 4rem; }
        }
    </style>
</head>
<body>
    <!-- Full-screen video only - the major attraction -->
    <section class="video-section">
        <div class="video-container">
            <!-- Clean Vimeo embed: minimal branding possible -->
            <iframe src="https://player.vimeo.com/video/1176733151?autoplay=0&loop=0&muted=1&title=0&byline=0&portrait=0&transparent=0" 
                    frameborder="0" 
                    allow="autoplay; fullscreen; picture-in-picture" 
                    allowfullscreen>
            </iframe>
        </div>
    </section>

    <!-- Simple contact at the bottom -->
    <section class="contact">
        <h2>Contact Us</h2>
        <a href="mailto:contact@bio-techventures.com" class="email">
            contact@bio-techventures.com
        </a>
    </section>

    <footer>
        &copy; 2026 Bio-Tech Ventures • Research &amp; Development Laboratory
    </footer>

    <script>
        // Auto-play video when it becomes visible (muted for better landing page experience)
        const iframe = document.querySelector('iframe');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting && entry.intersectionRatio > 0.7) {
                    let src = iframe.src;
                    if (!src.includes('autoplay=1')) {
                        src = src.replace('autoplay=0', 'autoplay=1');
                        iframe.src = src;
                    }
                }
            });
        }, { threshold: 0.7 });

        observer.observe(iframe);
    </script>
</body>
</html>
